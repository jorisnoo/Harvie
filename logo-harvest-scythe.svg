<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <!-- Scythe handle -->
  <path d="M95 85 Q 80 70, 55 55 Q 30 40, 25 20"
        stroke="#8B5A2B" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- QR-pattern blade -->
  <path d="M25 20 Q 15 10, 35 5 Q 60 0, 70 15 Q 75 25, 55 35 Q 35 45, 25 20"
        fill="#FF8B24"/>

  <!-- QR finder patterns on blade -->
  <rect x="30" y="8" width="10" height="10" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="32" y="10" width="6" height="6" rx="1" fill="#FF8B24"/>
  <rect x="34" y="12" width="2" height="2" fill="white"/>

  <rect x="48" y="10" width="10" height="10" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="50" y="12" width="6" height="6" rx="1" fill="#FF8B24"/>
  <rect x="52" y="14" width="2" height="2" fill="white"/>

  <rect x="38" y="20" width="10" height="10" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="40" y="22" width="6" height="6" rx="1" fill="#FF8B24"/>
  <rect x="42" y="24" width="2" height="2" fill="white"/>

  <!-- Swiss cross accent -->
  <circle cx="100" cy="80" r="12" fill="#E53935"/>
  <rect x="97" y="72" width="6" height="16" fill="white"/>
  <rect x="92" y="77" width="16" height="6" fill="white"/>
</svg>

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and test
        run: >
          xcodebuild test
          -project HarvestQRBill.xcodeproj
          -scheme HarvestQRBill
          -destination 'platform=macOS'

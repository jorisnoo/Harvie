name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-14
            xcode: '16.2'
          - os: macos-15
            xcode: '16.2'
          - os: macos-26
            xcode: '26.2'
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer

      - name: Build and test
        run: >
          xcodebuild test
          -project HarvestQRBill.xcodeproj
          -scheme HarvestQRBill
          -destination 'platform=macOS'
          CODE_SIGN_IDENTITY=-
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGNING_ALLOWED=NO

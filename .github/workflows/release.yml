name: Build, Sign, Notarize and Release

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Sync version to Xcode project
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Syncing version $VERSION to Xcode project..."
          sed -i '' "s/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = $VERSION;/g" \
            HarvestQRBill.xcodeproj/project.pbxproj

      - name: Commit version sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HarvestQRBill.xcodeproj/project.pbxproj
          git diff --staged --quiet || git commit -m "chore: sync version ${{ steps.version.outputs.VERSION }} to Xcode"
          git push origin HEAD:main

      - name: Import code signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.MACOS_CI_KEYCHAIN_PWD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$MACOS_CI_KEYCHAIN_PWD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build and archive
        run: |
          xcodebuild archive \
            -project HarvestQRBill.xcodeproj \
            -scheme HarvestQRBill \
            -configuration Release \
            -archivePath $RUNNER_TEMP/HarvestQRBill.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ secrets.MACOS_CERTIFICATE_NAME }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Export app
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/HarvestQRBill.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "HarvestQRBill" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "HarvestQRBill.app" 150 185 \
            --app-drop-link 450 185 \
            --hide-extension "HarvestQRBill.app" \
            "$RUNNER_TEMP/HarvestQRBill-${{ steps.version.outputs.VERSION }}.dmg" \
            "$RUNNER_TEMP/export/HarvestQRBill.app"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit \
            "$RUNNER_TEMP/HarvestQRBill-${{ steps.version.outputs.VERSION }}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple "$RUNNER_TEMP/HarvestQRBill-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Verify notarization
        run: |
          spctl -a -vvv -t install "$RUNNER_TEMP/HarvestQRBill-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          # Extract notes for current version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Get content between this version header and the next version header
          awk "/^## .*${VERSION}/,/^## .*[0-9]+\.[0-9]+\.[0-9]+/{if(/^## .*[0-9]+\.[0-9]+\.[0-9]+/ && !/^## .*${VERSION}/)exit; print}" CHANGELOG.md > $RUNNER_TEMP/release_notes.md
          cat $RUNNER_TEMP/release_notes.md

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.version.outputs.VERSION }}" \
            "$RUNNER_TEMP/HarvestQRBill-${{ steps.version.outputs.VERSION }}.dmg" \
            --title "Release ${{ steps.version.outputs.VERSION }}" \
            --notes-file "$RUNNER_TEMP/release_notes.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
